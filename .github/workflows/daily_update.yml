name: Daily Update AI Research Atlas
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual runs for testing
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # To enable OPENALEX_OFFLINE_MODE for all steps, add a job-level env block:
    env:
      SKIP_HAIKU: "true"          # NOTE: currently inert — not read by the pipeline; grouping runs daily on Gemini
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-specter2-v1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight checks (compile + data integrity)
        run: |
          echo "=== Tool versions ==="
          python -c "import sys,pandas,numpy,pyarrow as pa; print('python',sys.version.split()[0]); print('pandas',pandas.__version__); print('numpy',numpy.__version__); print('pyarrow',pa.__version__)"
          echo "=== Byte-compile all Python sources ==="
          python -m py_compile *.py
          echo "  py_compile OK"
          echo "=== Validate committed data files ==="
          python - <<'PY'
          import os, glob, json
          import pyarrow.parquet as pq
          ok = True
          for p in sorted(glob.glob("*.parquet")):
              size = os.path.getsize(p)
              with open(p, "rb") as fh:
                  head = fh.read(4); fh.seek(-4, os.SEEK_END); tail = fh.read(4)
              if size < 8 or head != b"PAR1" or tail != b"PAR1":
                  print(f"  CORRUPT {p}: size={size} head={head!r} tail={tail!r}"); ok = False; continue
              try:
                  print(f"  OK   {p} ({pq.read_metadata(p).num_rows} rows)")
              except Exception as e:
                  print(f"  CORRUPT {p}: footer unreadable ({e})"); ok = False
          for j in sorted(glob.glob("*.json")):
              try:
                  with open(j) as fh: json.load(fh)
                  print(f"  OK   {j}")
              except Exception as e:
                  print(f"  CORRUPT {j}: {e}"); ok = False
          if not ok:
              print("Preflight FAILED -- a committed file is corrupted. "
                    "Restore it from the last good commit.")
              raise SystemExit(1)
          print("Preflight passed.")
          PY

      # ════════════════════════════════════════════════════════════════════
      # RUN MODES — set env vars below to match your current goal
      #
      # ── STATIC TEST (layout / UI iteration, no API calls) ───────────────
      #   Use when: tweaking SCATTER_FRACTION, LAYOUT_SCALE, CSS, panel HTML,
      #             or anything in the docs/ build that doesn't need fresh data.
      #   Cost: $0. Runtime: ~2 min (just layout + Atlas build).
      #   Requires: database.parquet and group_names_v2.json already committed
      #             from a previous normal run.
      #
      #   Set:  OFFLINE_MODE: "true"   (uncomment the line below)
      #   Keep: GOOGLE_API_KEY present but unused
      #   Rest: all other vars are ignored in this mode
      #
      # ── RUNNING TEST (full pipeline, triggered manually) ─────────────────
      #   Use when: validating a code change end-to-end before it goes live,
      #             or after a multi-day gap where papers may have accumulated.
      #   Cost: ~$0.01–0.02 Gemini 2.5 Flash-Lite + OpenAlex/S2 free tier. Runtime: ~10 min.
      #
      #   Set:  OFFLINE_MODE commented out (normal mode)
      #   Keep: GOOGLE_API_KEY active
      #   Note: BACKFILL_HINDICES only needed if author_hindices was lost or
      #         corrupted — comment it back out after one successful run
      #
      # ── PRODUCTION (daily scheduled run, 00:00 UTC) ──────────────────────
      #   The cron trigger handles this automatically. No changes needed
      #   beyond confirming the two "must be off" items below are off.
      #
      #   OFFLINE_MODE:          must be commented out
      #   BACKFILL_HINDICES:     must be commented out
      #   OPENALEX_OFFLINE_MODE: must be commented out (job-level env block)
      #   SKIP_HAIKU:            currently inert (not read by the pipeline)
      #   Everything else:  leave as configured
      # ════════════════════════════════════════════════════════════════════

      - name: Diagnose environment
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== Python version ==="
          python --version

          echo "=== Checking HuggingFace connectivity ==="
          curl -s --max-time 10 https://huggingface.co/allenai/specter2_base/resolve/main/config.json \
            -H "Authorization: Bearer $HF_TOKEN" \
            -o /dev/null -w "HTTP status: %{http_code}\n" \
            || echo "FAILED: HuggingFace unreachable or timed out"

          echo "=== Importing core libs ==="
          python -c "import numpy; print('numpy OK')"
          python -c "import pandas; print('pandas OK')"
          python -c "import torch; print('torch OK')"
          python -c "print('importing sentence_transformers...'); import sentence_transformers; print('sentence_transformers OK')"
          python -c "print('importing transformers...'); import transformers; print('transformers OK')"

          echo "=== Attempting SPECTER2 model load (actual model used in pipeline) ==="
          python -c "
          from sentence_transformers import SentenceTransformer
          print('Loading allenai/specter2_base via SentenceTransformer...')
          model = SentenceTransformer('allenai/specter2_base')
          print('SPECTER2 model load OK')
          "

          echo "=== Diagnostics complete ==="

      - name: Run Update Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_TARGET_RPM: "8"   # free-tier pacing: 8 req/min (20% under the 10 RPM cap); set 6 for more margin, 0 to disable on paid
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONUNBUFFERED: "1"
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

          # ── STATIC TEST: uncomment to skip arXiv, SPECTER2, and Gemini ─────
          # Runs layout + Atlas build only. Use for UI/CSS iteration.
          # OFFLINE_MODE: "true"

          # ── One-time repair: rebuilds author h-index for all papers ──────
          # Comment out immediately after one successful run.
          # BACKFILL_HINDICES: "true"

          # ── Optional: higher Semantic Scholar API rate limits ────────────
          # Unnecessary for daily volume — only add if you see S2 rate errors.
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}

        run: |
          echo "=== Testing imports ==="
          python -c "
          print('Step 1: stdlib...'); import os, json, datetime; print('OK')
          print('Step 2: numpy...'); import numpy; print('OK')
          print('Step 3: pandas...'); import pandas; print('OK')
          print('Step 4: sklearn...'); import sklearn; print('OK')
          print('Step 5: umap...'); import umap; print('OK')
          print('Step 6: torch...'); import torch; print('OK')
          print('Step 7: sentence_transformers...'); import sentence_transformers; print('OK')
          print('Step 8: google.genai...'); from google import genai; print('OK')
          print('Step 9: atlas_utils...'); import atlas_utils; print('OK')
          print('All imports OK')
          "
          echo "=== Running main script ==="
          python update_map_v3.py

      - name: Run Daily Significant Papers
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python daily_significant.py

      - name: Run nightly assertions
        run: python nightly_assert.py

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database.parquet 2>/dev/null || true
          git add run_state.json 2>/dev/null || true
          git add author_stats_cache.json 2>/dev/null || true
          git add author_cache.json 2>/dev/null || true
          git add group_names_v3.json 2>/dev/null || true
          git add dynamic_taxonomy.json 2>/dev/null || true
          git add labels_v3.parquet 2>/dev/null || true
          git add ss_cache.json 2>/dev/null || true
          git add significant_papers.json 2>/dev/null || true
          git add sig_candidates.json 2>/dev/null || true
          git add label_diagnostics.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update rolling database: $(date -u +'%Y-%m-%d')"
            git pull --no-rebase --autostash origin main
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
