name: Weekly Update Significant Papers
on:
  schedule:
    - cron: '0 4 * * 1'   # Monday 04:00 UTC — 1 hour after daily run
  workflow_dispatch:       # Manual trigger for testing
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight checks (compile + data integrity)
        run: |
          echo "=== Tool versions ==="
          python -c "import sys,pandas,numpy,pyarrow as pa; print('python',sys.version.split()[0]); print('pandas',pandas.__version__); print('numpy',numpy.__version__); print('pyarrow',pa.__version__)"
          echo "=== Byte-compile all Python sources ==="
          python -m py_compile *.py
          echo "  py_compile OK"
          echo "=== Validate committed data files ==="
          python - <<'PY'
          import os, glob, json
          import pyarrow.parquet as pq
          ok = True
          for p in sorted(glob.glob("*.parquet")):
              size = os.path.getsize(p)
              with open(p, "rb") as fh:
                  head = fh.read(4); fh.seek(-4, os.SEEK_END); tail = fh.read(4)
              if size < 8 or head != b"PAR1" or tail != b"PAR1":
                  print(f"  CORRUPT {p}: size={size} head={head!r} tail={tail!r}"); ok = False; continue
              try:
                  print(f"  OK   {p} ({pq.read_metadata(p).num_rows} rows)")
              except Exception as e:
                  print(f"  CORRUPT {p}: footer unreadable ({e})"); ok = False
          for j in sorted(glob.glob("*.json")):
              try:
                  with open(j) as fh: json.load(fh)
                  print(f"  OK   {j}")
              except Exception as e:
                  print(f"  CORRUPT {j}: {e}"); ok = False
          if not ok:
              print("Preflight FAILED -- a committed file is corrupted. "
                    "Restore it from the last good commit.")
              raise SystemExit(1)
          print("Preflight passed.")
          PY
      # ════════════════════════════════════════════════════════════════════
      # WEEKLY SIGNIFICANT PAPERS DISCOVERY
      #
      # What this does (discovery + retirement only):
      #   1. Fetches new cs.AI arXiv IDs since last run via OAI-PMH
      #   2. Looks up citation counts via Semantic Scholar batch API
      #   3. Maintains a top-500 candidate pool in sig_candidates.json
      #   4. Selects top-75 by influential citations → significant.parquet
      #   5. Applies two-strike retirement logic
      #
      # What this does NOT do (handled by daily_significant.yml instead):
      #   - Author h-index enrichment (OpenAlex)
      #   - S2 citation refresh for the candidate pool
      #   - Prominence recomputation
      #
      # New papers enter with Prominence="Unverified". The daily job
      # enriches them within 24 hours (up to 900 authors/day).
      #
      # Cost: ~$0. Uses only S2 free tier. Runtime: ~5 min.
      # ════════════════════════════════════════════════════════════════════
      - name: Run Significant Papers Scan
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python update_significant.py
      - name: Commit Significant Papers
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add significant.parquet 2>/dev/null || true
          git add sig_candidates.json 2>/dev/null || true
          git add author_cache.json 2>/dev/null || true
          git add ss_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update significant papers pool: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          fi

      # ════════════════════════════════════════════════════════════════════
      # WEEKLY FULL PIPELINE RUN (Gemini grouping)
      #
      # Runs immediately after the significant papers scan so the atlas
      # reflects the updated pool. Two-pass Gemini 2.5 Flash-Lite grouping
      # runs here on the refreshed pool.
      #
      # NOTE: SKIP_HAIKU in daily_update.yml is currently inert — nothing in
      # the pipeline reads it — so the daily run ALSO performs full grouping.
      # Both runs now use Gemini 2.5 Flash-Lite. To gate grouping to weekly
      # only, a SKIP_HAIKU check would have to be added to update_map_v3.py.
      # ════════════════════════════════════════════════════════════════════
      - name: Run Weekly Atlas Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_TARGET_RPM: "8"   # free-tier pacing: 8 req/min (20% under the 10 RPM cap); set 6 for more margin, 0 to disable on paid
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python update_map_v3.py

      - name: Run Nightly Assertions
        run: python nightly_assert.py

      - name: Commit Weekly Pipeline Outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database.parquet 2>/dev/null || true
          git add run_state.json 2>/dev/null || true
          git add author_cache.json 2>/dev/null || true
          git add author_stats_cache.json 2>/dev/null || true
          git add group_names_v3.json 2>/dev/null || true
          git add dynamic_taxonomy.json 2>/dev/null || true
          git add labels_v3.parquet 2>/dev/null || true
          git add ss_cache.json 2>/dev/null || true
          git add significant_papers.json 2>/dev/null || true
          git add sig_candidates.json 2>/dev/null || true
          git add label_diagnostics.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly atlas update: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
